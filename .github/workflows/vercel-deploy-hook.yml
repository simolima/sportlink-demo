name: Vercel Deploy Hook (prod)

on:
  push:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Debug - Check if secret exists
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "❌ ERROR: VERCEL_DEPLOY_HOOK is empty or not set!"
            exit 1
          else
            echo "✅ Secret is set (length: ${#HOOK_URL} chars)"
          fi
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK }}
      
      - name: Call Vercel Deploy Hook
        run: curl -X POST "$HOOK_URL"
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK }}
