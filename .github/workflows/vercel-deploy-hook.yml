name: Vercel Deploy Trigger Commit

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  trigger-empty-commit:
    if: github.event.head_commit.message != 'trigger deploy on vercel'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main with user token
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.USER_GH_PAT }}

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.USER_GH_PAT }}" ]; then
            echo "❌ Missing secret USER_GH_PAT"
            exit 1
          fi
          if [ -z "${{ secrets.GIT_USER_NAME }}" ]; then
            echo "❌ Missing secret GIT_USER_NAME"
            exit 1
          fi
          if [ -z "${{ secrets.GIT_USER_EMAIL }}" ]; then
            echo "❌ Missing secret GIT_USER_EMAIL"
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name "${{ secrets.GIT_USER_NAME }}"
          git config user.email "${{ secrets.GIT_USER_EMAIL }}"

      - name: Create empty commit
        run: git commit --allow-empty -m "trigger deploy on vercel"

      - name: Push empty commit to main
        env:
          USER_GH_PAT: ${{ secrets.USER_GH_PAT }}
        run: |
          git remote set-url origin https://x-access-token:${USER_GH_PAT}@github.com/${{ github.repository }}.git
          git push origin main
